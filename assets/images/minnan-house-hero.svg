      <path d="M36 5C45 16 56 27 67 36 56 45 45 56 36 67 27 56 16 45 5 36 16 27 27 16 36 5Z" fill="none" stroke="#336b68" stroke-width="4"/>
      <circle cx="36" cy="36" r="8" fill="#b8863b"/>
      <path d="M7 7l58 58M65 7L7 65" stroke="#9b4637" stroke-width="2" opacity=".7"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="22" stdDeviation="18" flood-color="#3a1815" flood-opacity=".35"/></filter>
  </defs>
