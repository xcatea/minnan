<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Stylised Minnan ancestral house</title>
  <desc id="desc">A warm illustration of a red-brick Minnan house with swallow-tail rooflines, stone-and-brick walls, flower tiles and a central family hall.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#e9d7b9"/><stop offset="1" stop-color="#c98e67"/></linearGradient>
    <linearGradient id="brick" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#9b4637"/><stop offset="1" stop-color="#6f2e26"/></linearGradient>
    <linearGradient id="roof" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#51201d"/><stop offset="1" stop-color="#2f1716"/></linearGradient>
    <pattern id="brickPattern" width="74" height="34" patternUnits="userSpaceOnUse">
      <rect width="74" height="34" fill="url(#brick)"/>
      <path d="M0 33.5H74M37 0v17M0 17h74" stroke="#d47a5a" stroke-opacity=".42" stroke-width="2"/>
    </pattern>
    <pattern id="stonePattern" width="120" height="76" patternUnits="userSpaceOnUse">
      <rect width="120" height="76" fill="#918477"/>
      <path d="M0 38h120M60 0v38M20 38v38M100 38v38" stroke="#c3b8a8" stroke-width="3" opacity=".5"/>
    </pattern>
    <pattern id="tilePattern" width="72" height="72" patternUnits="userSpaceOnUse">
